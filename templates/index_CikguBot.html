<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cikgu Bot - Year 6 Science QnA</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap">
    <style>
        /* General Styling */
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #f3f9f1;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Banner Styling */
        .banner {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 20px;
            text-align: center;
        }

        .banner img {
            width: 100px;      /* Change to any size you want */
            height: auto;      /* Keeps aspect ratio */
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
            display: block;
            margin: 0 auto;
        }


        /* Split Container Styling */
        .split-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            margin-top: 20px;
        }

        .module-container {
            flex: 1;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: fit-content;
        }

        /* Header Styling for Chat Container */
        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h2 {
            font-size: 24px;
            margin: 0;
            color: #388e3c;
        }

        .header p {
            font-size: 14px;
            color: #555;
        }

        #user-stats {
            font-size: 16px;
            margin-top: 10px;
        }

        /* Chat Box Styling */
        .chat-box {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            background-color: #f9fbe7;
            margin-bottom: 20px;
            flex-grow: 1;
            width: 100%;
        }

        .user, .bot {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 25px;
            margin: 10px 0;
            max-width: 70%;
            word-wrap: break-word;
            font-size: 16px;
        }

        .user {
            background-color: #b3e5fc;
            color: #0288d1;
            align-self: flex-end;
        }

        .bot {
            background-color: #ffecb3;
            color: #f57f17;
            align-self: flex-start;
        }

        /* Input Section Styling */
        .input-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
            width: 100%;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            margin-right: 10px;
        }

        button {
            background-color: #66bb6a;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #43a047;
        }

        /* Quiz Section Styling */
        #quiz-container h3 {
            font-size: 24px;
            color: #ff7043;
            margin-bottom: 15px;
        }

        #quiz-topic {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
            margin-bottom: 10px;
            width: 100%;
            max-width: 300px;
        }

        #quiz-container button {
            background-color: #ff7043;
        }

        #quiz-question-container {
            text-align: center;
            margin-top: 20px;
            background-color: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
        }

        .choice-label {
            display: block;
            margin: 10px 0;
            font-size: 18px;
        }
    </style>
</head>

<body>
    <!-- Banner Section -->
    <div class="banner">
        <img src="{{ url_for('static', filename='Cikgu_Bot.jpg') }}" alt="Cikgu Bot Icon">
    </div>

    <!-- Split Container for Chat and Quiz Modules -->
    <div class="split-container">
        <!-- Chat Module -->
        <div id="chat-container" class="module-container">
            <!-- Header Section with Title and Description -->
            <div class="header">
                <h2>Cikgu Bot - Chat with Me 🌟</h2>
                <p>Ask me anything about Science and let’s learn together!</p>
                <div id="user-stats">
                    <p>Points: <span id="user-points">0</span></p>
                    <p>Stickers: <span id="user-stickers">None</span></p>
                </div>
            </div>

            <!-- Chat Box Area -->
            <div class="chat-box" id="chat-box">
                <!-- Chat messages will appear here -->
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Ask me anything about Science..." onkeydown="checkEnter(event)">
                <button onclick="sendMessage()">Send 🚀</button>
            </div>
        </div>

        <!-- Quiz Module -->
        <div id="quiz-container" class="module-container">
            <h3>Take a Quiz 🧠</h3>
            <input type="text" id="quiz-topic" placeholder="Enter a topic (e.g., human body, planets)">
            <button id="generate-quiz-button" onclick="generateQuiz()">Generate Quiz Question</button>

            <!-- Display Quiz Question -->
            <div id="quiz-question-container" style="display: none;">
                <p id="quiz-question"></p>
                <div id="quiz-choices"></div>
                <button id="submit-answer-button" style="display: none;" onclick="submitQuizAnswer()">Submit Answer</button>
            </div>
        </div>
    </div>

    <script>
        let currentCorrectAnswer = "";

        async function generateQuiz() {
            const topic = document.getElementById("quiz-topic").value;
            if (!topic) {
                alert("Please enter a topic!");
                return;
            }

            const response = await fetch("/generate_quiz", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ topic: topic })
            });

            const quizData = await response.json();
            document.getElementById("quiz-question").innerText = quizData.question;

            const choicesContainer = document.getElementById("quiz-choices");
            choicesContainer.innerHTML = "";
            const labels = ["A", "B", "C", "D"];

            // Ensure only four options are displayed, labeled correctly, and randomized
            quizData.choices.slice(0, 4).forEach((choice, index) => {
                const choiceElement = document.createElement("div");
                choiceElement.classList.add("choice-label");

                // Remove any existing label (like "A) ") at the start of the choice if present
                const formattedChoice = choice.replace(/^[A-D]\)\s*/, "").trim();

                choiceElement.innerHTML = `<input type="radio" name="quiz-choice" value="${formattedChoice}"> ${labels[index]}) ${formattedChoice}`;
                choicesContainer.appendChild(choiceElement);
            });

            // Store the correct answer as plain text for comparison
            currentCorrectAnswer = quizData.correct_answer.trim();

            document.getElementById("quiz-question-container").style.display = "block";
            document.getElementById("submit-answer-button").style.display = "inline-block";
        }

async function submitQuizAnswer() {
    const selectedChoice = document.querySelector('input[name="quiz-choice"]:checked');
    if (!selectedChoice) {
        alert("Please select an answer!");
        return;
    }

    const answer = selectedChoice.value.trim(); // Get the selected answer text and trim whitespace
    const username = "guest"; // Change this to dynamically get the username if it's a logged-in user

    const response = await fetch("/quiz_answer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            answer: answer,
            correct_answer: currentCorrectAnswer,
            username: username
        })
    });

    const result = await response.json();
    alert(result.message);

    // Update points and stickers in the UI if available in the response
    if (result.points !== undefined) {
        document.getElementById("user-points").textContent = result.points;
    }
    if (result.stickers) {
        document.getElementById("user-stickers").textContent = result.stickers;
    }
}


        async function sendMessage() {
            const userInput = document.getElementById("user-input").value;
            if (!userInput) return;

            // Display user's message in the chat box
            const chatBox = document.getElementById("chat-box");
            const userMessage = document.createElement("div");
            userMessage.className = "user";
            userMessage.textContent = userInput;
            chatBox.appendChild(userMessage);

            // Send the message to the server
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userInput, username: "guest" })
            });

            // Get the chatbot's response
            const responseData = await response.json();
            const botMessage = document.createElement("div");
            botMessage.className = "bot";
            botMessage.textContent = responseData.response;
            chatBox.appendChild(botMessage);

            // Update user points and stickers
            document.getElementById("user-points").textContent = responseData.points;
            document.getElementById("user-stickers").textContent = responseData.stickers || "None";

            // Scroll to the bottom of the chat box
            chatBox.scrollTop = chatBox.scrollHeight;

            // Clear the input field
            document.getElementById("user-input").value = "";
        }
    </script>
</body>
</html>
